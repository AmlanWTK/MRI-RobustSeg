
name: brain_tumor_detection
description: Professional brain tumor detection app for medical professionals.
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.5

  # Network & API
  http: ^0.13.5
  dio: ^5.3.2

  # Image Handling
  image_picker: ^0.8.9
  image: ^4.1.3

  # File Management
  file_picker: ^8.1.4
  path_provider: ^2.1.1

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0

  # Charts & Visualization
  fl_chart: ^0.64.0
  percent_indicator: ^4.2.3

  # PDF & Reporting
  pdf: ^3.10.7
  printing: ^5.11.0

  # Utilities
  intl: ^0.18.1
  uuid: ^4.1.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
